# LibraryFlow — local development stack
# Run: docker compose up -d
# Stop: docker compose down
# Stop and wipe data: docker compose down -v

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: libraryflow-sqlserver
    hostname: libraryflow-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD must be set in .env}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - libraryflow_mssql_data:/var/opt/mssql
    healthcheck:
      # sqlcmd 18 enables encryption by default; -C trusts the self-signed dev cert.
      test:
        - "CMD-SHELL"
        - "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - libraryflow-net

volumes:
  libraryflow_mssql_data:
    name: libraryflow_mssql_data

networks:
  libraryflow-net:
    name: libraryflow-net
    driver: bridge
